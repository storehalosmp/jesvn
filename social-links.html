<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>@yourname</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
    background: #05060a;
    overflow: hidden;
  }

  /* ---------- Snow particles ---------- */
  .snow {
    position: fixed;
    top: -10px;
    color: rgba(255,255,255,0.7);
    font-size: 1em;
    user-select: none;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 5;
  }

  @keyframes fall {
    0%   { transform: translateY(-10vh) translateX(0); opacity: 0.9; }
    100% { transform: translateY(110vh) translateX(20px); opacity: 0.2; }
  }

  /* ---------- Click to enter overlay ---------- */
  #enterOverlay {
    position: fixed;
    inset: 0;
    background: #05060a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }

  #enterOverlay p {
    color: #888;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  #enterOverlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ---------- Main card ---------- */
  .page {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    position: relative;
    z-index: 10;
    width: 320px;
    background: rgba(15, 16, 22, 0.55);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 34px 26px 26px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55);
    opacity: 0;
    transform: translateY(14px);
    transition: all 0.7s ease;
  }

  .card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, #3a3f58, #1c1e29);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #fff;
    box-shadow: 0 0 25px rgba(120,130,255,0.25);
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .username {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #ff5da2, #6c63ff, #33d1ff, #ff5da2);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: cycleColor 4s linear infinite;
  }

  @keyframes cycleColor {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .uid {
    color: #6b6f7d;
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .uid:empty {
    display: none;
  }

  .tagline {
    color: #9aa0b4;
    font-size: 13px;
    margin-top: 10px;
  }

  .location {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 5px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    color: #cfd2dc;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  hr.divider {
    border: none;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 20px 0;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .socials a {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.2s ease;
  }

  .socials a svg { width: 20px; height: 20px; fill: #d7d9e2; }

  .socials a:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.1);
  }
  .socials a.discord:hover  { box-shadow: 0 6px 18px rgba(88,101,242,0.45); }
  .socials a.facebook:hover { box-shadow: 0 6px 18px rgba(24,119,242,0.45); }
  .socials a.tiktok:hover   { box-shadow: 0 6px 18px rgba(255,255,255,0.25); }

  .views {
    color: #6b6f7d;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .views span { color: #cfd2dc; font-weight: 600; }

  /* ---------- Music button ---------- */
  .music-toggle {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .music-toggle:hover { transform: scale(1.08); background: rgba(255,255,255,0.14); }
  .music-toggle svg { width: 20px; height: 20px; fill: #fff; }

  .music-panel {
    position: fixed;
    bottom: 80px;
    right: 22px;
    width: 220px;
    background: rgba(15, 16, 22, 0.85);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px;
    color: #fff;
    backdrop-filter: blur(14px);
    transform: translateY(16px) scale(0.95);
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    z-index: 100;
  }

  .music-panel.open {
    transform: translateY(0) scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  .music-panel h3 {
    font-size: 12px;
    color: #9aa0b4;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .music-controls {
    display: flex;
    gap: 8px;
  }

  .music-controls button {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 7px 0;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }

  .music-controls button:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<!-- Click to enter -->
<div id="enterOverlay">
  <p>click to enter...</p>
</div>

<!-- Snowfall -->
<div id="snowContainer"></div>

<div class="page">
  <div class="card" id="mainCard">
    <div class="avatar"><img alt="avatar" src="0c7c299d-8a94-4a83-9b08-e57830395573.png"></div>
    <div class="username">JESVN</div>
    <div class="uid"></div>
    <div class="tagline">Developer / Streamer</div>
    <div class="location">📍 PHNOM PENH</div>

    <hr class="divider">

    <div class="socials">
      <a class="discord" href="https://discord.com" target="_blank" rel="noopener" title="Discord">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.369a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.07.07 0 0 0-.032.027C.533 9.09-.32 13.579.099 18.021a.082.082 0 0 0 .031.056 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .078.009c.12.099.246.198.373.292a.077.077 0 0 1-.006.128 12.3 12.3 0 0 1-1.873.891.076.076 0 0 0-.04.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.029 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.055c.5-5.177-.838-9.637-3.548-13.625a.06.06 0 0 0-.031-.028zM8.02 15.331c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.211 0 2.176 1.096 2.157 2.42 0 1.332-.955 2.418-2.157 2.418zm7.974 0c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.211 0 2.176 1.096 2.157 2.42 0 1.332-.946 2.418-2.157 2.418z"/></svg>
      </a>
      <a class="facebook" href="https://facebook.com" target="_blank" rel="noopener" title="Facebook">
        <svg viewBox="0 0 24 24"><path d="M9.198 21.5h4v-8.01h3.604l.396-3.98h-4V7.5a1 1 0 0 1 1-1h3v-4h-3a5 5 0 0 0-5 5v2.01h-2l-.396 3.98h2.396v8.01z"/></svg>
      </a>
      <a class="tiktok" href="https://tiktok.com" target="_blank" rel="noopener" title="TikTok">
        <svg viewBox="0 0 24 24"><path d="M16.5 3c.14 1.6.94 2.9 2.2 3.8 1 .7 2.2 1.1 3.3 1.1v3.1c-1.5 0-2.9-.4-4.2-1.2v6.6c0 3.3-2.7 6-6 6-1.3 0-2.6-.4-3.6-1.2-1.7-1.3-2.6-3.4-2.3-5.6.4-2.8 2.8-5 5.6-5.1.4 0 .8 0 1.1.1v3.2c-.4-.1-.8-.2-1.2-.2-1.6 0-2.9 1.3-2.9 2.9 0 1.1.6 2.1 1.6 2.6.5.2 1 .3 1.5.3 1.6 0 2.9-1.2 3-2.8V3h3.1z"/></svg>
      </a>
    </div>

    <div class="views">
      <span id="viewCount">10</span> Profile Views
    </div>
  </div>
</div>

<!-- Floating music toggle -->
<button class="music-toggle" id="musicToggle" title="Open/Close music player">
  <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
</button>

<div class="music-panel" id="musicPanel">
  <h3>NOW PLAYING</h3>
  <audio id="audioPlayer" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-summer.mp3" type="audio/mpeg">
  </audio>
  <div class="music-controls">
    <button id="playPauseBtn">▶ Play</button>
    <button id="closeBtn">✕</button>
  </div>
</div>

<script>
  // Snowfall generation
  const snowContainer = document.getElementById('snowContainer');
  const flakeCount = 40;
  for (let i = 0; i < flakeCount; i++) {
    const flake = document.createElement('div');
    flake.className = 'snow';
    flake.textContent = '❅';
    flake.style.left = Math.random() * 100 + 'vw';
    flake.style.fontSize = (Math.random() * 10 + 8) + 'px';
    flake.style.animationDuration = (Math.random() * 6 + 6) + 's';
    flake.style.animationDelay = (Math.random() * 6) + 's';
    snowContainer.appendChild(flake);
  }

  // Click to enter -> reveal card + start music
  const enterOverlay = document.getElementById('enterOverlay');
  const mainCard = document.getElementById('mainCard');
  const audioPlayer = document.getElementById('audioPlayer');
  const playPauseBtn = document.getElementById('playPauseBtn');

  enterOverlay.addEventListener('click', () => {
    enterOverlay.classList.add('hidden');
    mainCard.classList.add('show');
    audioPlayer.play().then(() => {
      playPauseBtn.textContent = '⏸ Pause';
    }).catch(() => {});
  });

  // Music panel open/close
  const musicToggle = document.getElementById('musicToggle');
  const musicPanel = document.getElementById('musicPanel');
  const closeBtn = document.getElementById('closeBtn');

  musicToggle.addEventListener('click', () => {
    musicPanel.classList.toggle('open');
  });
  closeBtn.addEventListener('click', () => {
    musicPanel.classList.remove('open');
  });

  playPauseBtn.addEventListener('click', () => {
    if (audioPlayer.paused) {
      audioPlayer.play();
      playPauseBtn.textContent = '⏸ Pause';
    } else {
      audioPlayer.pause();
      playPauseBtn.textContent = '▶ Play';
    }
  });

  // Fake view counter bump
  window.addEventListener('load', () => {
    const viewEl = document.getElementById('viewCount');
    let count = parseInt(viewEl.textContent, 10);
    setTimeout(() => { viewEl.textContent = count + 1; }, 1500);
  });
</script>

</body>
</html>
